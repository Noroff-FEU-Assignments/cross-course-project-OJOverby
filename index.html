<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameHub - Home</title>
  <meta name="description" content="GameHub is your source for buying digital games and buying and selling your used games">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <section class="top-line"><p>Your source for digital games online</p></section>
    <section class="top-nav"><img src="/images/GameHub.png" alt="GameHub logo" class="navLogo">
      <nav>
        <img src="icons/contact.svg" alt="Contact icon" class="navicon">
        <img src="icons/profile.svg" alt="Profile icon" class="navicon">
        <img src="icons/shopping_cart.svg" alt="Shopping cart icon" class="navicon">
      </nav>
    </section>
    <section class="search-nav">
      <img src="icons/hamburger_menu.svg" alt="Menu link">
      <form action="" class="searchbar">
        <input type="text" placeholder="SEARCH" name="search">
        <button type="submit"><img  class="searchicon" src="icons/search.svg" alt="Search button"></button>
      </form>
    </section>
  </header>
  <main>
    <img src="images/GHplaceholder.jpg" alt="GameHub logo cover art" class="heroImg">
  </main>
  <footer></footer>
  
</body>
</html>
